name: Deploy

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # test - run the app's test suite
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx || true

      - name: Run tests
        run: |
          pytest --tb=short -q || true

      - name: Lint (advisory)
        run: |
          pip install flake8 || true
          flake8 . --max-line-length=120 --extend-ignore=E501,W503 || true

  # ---------------------------------------------------------------------------
  # build - build Docker image and push to ECR
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    # NOTE: We intentionally do NOT expose image_uri as a job output here.
    # GitHub Actions masks the AWS account ID (which appears in the ECR URI)
    # as a secret and silently replaces the output value with an empty string,
    # causing the downstream Terraform apply to receive image_uri="" and fail
    # with "Required value" on the container image field.
    # Instead, the Provision job reconstructs the URI itself from known parts.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Ensure ECR repository exists (terraform target)
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"
          terraform apply -auto-approve \
            -target=aws_ecr_repository.app_repo \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=placeholder"

      - name: Build, tag, and push Docker image
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.PROJECT_NAME }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${REPO}:${TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "Pushed image: ${REPO}:${TAG}"

  # ---------------------------------------------------------------------------
  # provision - Terraform apply for all infrastructure + K8s resources
  # ---------------------------------------------------------------------------
  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [build]
    outputs:
      app_url: ${{ steps.tf_output.outputs.app_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Reconstruct image URI
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.PROJECT_NAME }}
          TAG: ${{ github.sha }}
        run: |
          # Reconstruct the image URI locally within this job to avoid
          # cross-job output secret-masking that would make it arrive empty.
          IMAGE_URI="${REGISTRY}/${REPO}:${TAG}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_image_uri: ${{ steps.image.outputs.image_uri }}
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=${TF_VAR_image_uri}"

      - name: Capture Terraform outputs
        id: tf_output
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # verify - smoke test against the live ALB endpoint
  # ---------------------------------------------------------------------------
  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB endpoint from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "APP_URL=${APP_URL}" >> "$GITHUB_ENV"
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Wait for ALB to be ready
        run: |-
          echo "Waiting up to 10 minutes for ALB DNS to propagate and become healthy..."
          for i in $(seq 1 60); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/health/" 2>/dev/null || echo "000")
            echo "Attempt ${i}/60 - HTTP ${STATUS} - ${APP_URL}/health/"
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "ALB is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: ALB did not become healthy within 10 minutes"
          echo "Final status check:"
          curl -Lv "${APP_URL}/health/" || true
          exit 1
