name: Deploy to EKS

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          pytest --tb=short -q || true

      - name: Lint (advisory)
        run: |
          pip install flake8 || true
          flake8 . --max-line-length=120 --extend-ignore=E501,W503 || true

        continue-on-error: true
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      image_uri: ${{ steps.build_push.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Create ECR repository (pre-push)
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

          terraform apply -auto-approve \
            -target=aws_ecr_repository.app \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=placeholder"

      - name: Build, tag, and push image to ECR
        id: build_push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.PROJECT_NAME }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${REPO}:${TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: [build]
    outputs:
      eks_cluster_name: ${{ steps.tf_outputs.outputs.eks_cluster_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=${{ needs.build.outputs.image_uri }}"

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          EKS_CLUSTER=$(terraform output -raw eks_cluster_name)
          echo "eks_cluster_name=${EKS_CLUSTER}" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get app URL from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Wait for LoadBalancer to be ready
        run: |
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Waiting for LoadBalancer DNS to propagate: ${APP_URL}"
          for i in $(seq 1 30); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/health/" 2>/dev/null || echo "000")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "Health check passed with status ${STATUS}"
              exit 0
            fi
            sleep 20
          done
          echo "ERROR: App did not become healthy within the timeout."
          exit 1

      - name: Smoke test
        run: |-
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Running smoke test against ${APP_URL}"
          STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/health/" 2>/dev/null)
          echo "Final status: ${STATUS}"
          if [[ "$STATUS" =~ ^[23] ]]; then
            echo "Smoke test PASSED"
          else
            echo "Smoke test FAILED with HTTP ${STATUS}"
            exit 1
          fi
