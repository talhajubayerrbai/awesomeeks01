name: Destroy

on:
  workflow_dispatch:

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Delete Kubernetes Ingress and wait for ALB deprovisioning
        run: |
          # Install kubectl
          curl -sSL "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl
          chmod +x /usr/local/bin/kubectl

          # Configure kubeconfig for the EKS cluster
          CLUSTER_NAME="${{ secrets.PROJECT_NAME }}-cluster"
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${CLUSTER_NAME}" || {
            echo "Could not reach EKS cluster (may already be gone). Skipping Ingress cleanup."
            exit 0
          }

          NAMESPACE="${{ secrets.PROJECT_NAME }}"
          INGRESS_NAME="${{ secrets.PROJECT_NAME }}-ingress"

          # Delete the Ingress so the ALB controller deprovisions the ALB
          # and releases all ENIs from the public subnets.
          if kubectl get ingress "${INGRESS_NAME}" -n "${NAMESPACE}" &>/dev/null; then
            echo "Deleting Ingress ${INGRESS_NAME} in namespace ${NAMESPACE}..."
            kubectl delete ingress "${INGRESS_NAME}" -n "${NAMESPACE}" --timeout=60s || true
          else
            echo "Ingress ${INGRESS_NAME} not found in namespace ${NAMESPACE} — already deleted or cluster is gone."
          fi

          # Now wait for the actual AWS ALB to be fully deprovisioned using the
          # AWS CLI. We cannot rely on the Kubernetes Ingress object's hostname
          # field here because the Ingress object is already deleted above, so
          # kubectl get ingress immediately returns an error and the hostname is
          # always empty — causing a false-positive "ALB is gone" result.
          #
          # Instead we query ELBv2 directly for any load balancers whose tags
          # identify them as belonging to this cluster. The AWS Load Balancer
          # Controller tags every ALB it creates with the Kubernetes service/
          # ingress ownership tags, including the cluster name tag. We poll
          # until no matching ALBs remain (or for up to 10 minutes).
          echo "Waiting for the AWS ALB to be fully deprovisioned (up to 10 minutes)..."
          for i in $(seq 1 60); do
            # List all ALBs whose tag elbv2.k8s.aws/cluster matches the EKS
            # cluster name. The AWS LBC always sets this tag on ALBs it manages.
            ALB_ARNS=$(
              aws elbv2 describe-load-balancers \
                --region "${{ secrets.AWS_REGION }}" \
                --query 'LoadBalancers[*].LoadBalancerArn' \
                --output text 2>/dev/null || echo ""
            )

            if [ -z "${ALB_ARNS}" ]; then
              echo "No load balancers found at all — ALB is deprovisioned."
              break
            fi

            # Filter by the cluster tag
            CLUSTER_ALB_COUNT=0
            for ARN in ${ALB_ARNS}; do
              TAGS=$(
                aws elbv2 describe-tags \
                  --region "${{ secrets.AWS_REGION }}" \
                  --resource-arns "${ARN}" \
                  --query 'TagDescriptions[0].Tags' \
                  --output text 2>/dev/null || echo ""
              )
              if echo "${TAGS}" | grep -q "${CLUSTER_NAME}"; then
                CLUSTER_ALB_COUNT=$((CLUSTER_ALB_COUNT + 1))
              fi
            done

            if [ "${CLUSTER_ALB_COUNT}" -eq 0 ]; then
              echo "All ALBs for cluster ${CLUSTER_NAME} have been deprovisioned."
              break
            fi

            echo "Attempt ${i}/60: ${CLUSTER_ALB_COUNT} ALB(s) for cluster ${CLUSTER_NAME} still exist, waiting 10s..."
            sleep 10
          done

          echo "ALB cleanup complete."

      - name: Terraform Destroy
        working-directory: terraform
        run: |-
          terraform destroy -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=placeholder"
